global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "inference-forge"
    static_configs:
      - targets: ["inference-forge:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
